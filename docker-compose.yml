# Local infra for apps/server persistence (BACKLOG E2.1).
# Usage: docker compose up -d, then set REDIS_URL / DATABASE_URL (see apps/server/.env.example).
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ludo
      POSTGRES_PASSWORD: ludo
      POSTGRES_DB: ludo
    ports:
      - '5432:5432'
