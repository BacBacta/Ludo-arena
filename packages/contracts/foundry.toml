[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

# Fuzz + invariant budget (Phase 2). Kept moderate so `forge test` stays under a
# minute locally; a deeper campaign runs via the `ci` profile (nightly).
[profile.default.fuzz]
runs = 256

[profile.default.invariant]
runs = 128
depth = 250
fail_on_revert = false

[profile.ci.invariant]
runs = 256
depth = 500

[rpc_endpoints]
alfajores = "${ALFAJORES_RPC}"
celo = "${CELO_RPC}"
sepolia = "${SEPOLIA_RPC}"
celo-sepolia = "${CELO_SEPOLIA_RPC}"
