# One-off Fly.io maintenance operations, run on demand from the Actions tab
# (workflow_dispatch) with the same FLY_API_TOKEN the deploy workflow uses.
# Each operation is a FIXED, named script — no free-form commands from inputs,
# so the token can never be steered into arbitrary flyctl calls.
#
# unset-cosmetics-store-address: removes the COSMETICS_STORE_ADDRESS secret
# left over from the first manual setup. It silently OVERRODE the baked
# deployments.json and pinned the cosmetics verifier to the first historical
# store through two redeploys (every cUSD claim failed "could not verify"
# until deployments.json was re-aligned). The server resolves the store from
# deployments.json on its own, and warns at boot if an override diverges —
# the secret is now pure drift risk. Unsetting restarts the machine.
#
# unset-escrow-addresses: same cleanup for ESCROW_ADDRESS / ESCROW_N_ADDRESS —
# the same override mechanism that broke the cosmetics store. Verified before
# adding this op: the addresses prod advertises in hello.ok already EQUAL the
# baked deployments.json (0xcf84c9… / 0x7c02f1…), so unsetting only removes
# the drift risk for the NEXT escrow redeploy; behaviour is unchanged.
#
# unset-staking-allowed-countries: removes the STAKING_ALLOWED_COUNTRIES
# secret, returning geo-gating to OPEN mode (no allowlist ⇒ isGeoBlocked is
# always false; the server warns loudly at boot). Context: the allowlist is
# fail-closed on an UNVERIFIED region, and with no trusted edge in front of
# the Fly WS (TRUSTED_EDGE_SECRET unset, no cf-ipcountry header) every
# player's region is unverifiable — so a set allowlist blocks staked play for
# 100% of mainnet players. Removing it is the OPERATOR'S compliance call
# (R-COMP-1): staked play becomes reachable from EVERY region until a trusted
# edge + a legal-reviewed allowlist are wired (docs/DEPLOY.md §G-6).
#
# set-tier-rake: on-chain OWNER call (not a Fly op) — sets the 1¢ Race tier to
# 1 bps (≈ rake-free) on the DEPLOYED escrows via packages/contracts
# `npm run set-tier-rake`. Needed because the deploy never seeded that tier, so
# every 1¢ race pot settled at the 900 bps global default (winner underpaid 9%).
# Reads the owner key from repo secrets (ESCROW_OWNER_PRIVATE_KEY /
# TREASURY_PRIVATE_KEY / DEPLOYER_PRIVATE_KEY); the script verifies on-chain
# ownership and is idempotent. Rake snapshots per game at join — only games
# created after the call settle rake-free.
#
# arm-mainnet: flips the running server to Celo MAINNET and sets the Race Week
# faucet/JIT secrets in ONE atomic `flyctl secrets import` (single restart). The
# two real key secrets (ARBITER_PRIVATE_KEY, RACE_FAUCET_PRIVATE_KEY) are read
# from GitHub *repo secrets* — NOT from workflow inputs — so private keys never
# appear in the run inputs or logs (GitHub masks registered secret values). To
# guard against an accidental run it requires typing ARM-MAINNET in `confirm`.
# STAKING_ENABLED (real-money staked play, R-COMP-2 gate) is set ONLY when
# `enable_staking=true` is chosen explicitly — the default arms mainnet free
# play + Race Week with staked play still OFF. Run this in lockstep with merging
# the frontend switch (vercel.json VITE_CHAIN=celo) so client + server agree on
# the chain.
name: fly-ops
on:
  workflow_dispatch:
    inputs:
      operation:
        description: 'Maintenance operation to run'
        required: true
        type: choice
        options:
          - unset-cosmetics-store-address
          - unset-escrow-addresses
          - unset-staking-allowed-countries
          - arm-mainnet
          - set-tier-rake
          - allow-token
          - race-status
          - onchain-activity
          - race-audit
          - wallet-status
          - arm-house-bot
          - reset-race-board
          - prune-race-board
          - server-logs
          - probe-fees
          - probe-lock
          - probe-feecurrencies
      confirm:
        description: 'arm-mainnet: ARM-MAINNET · reset-race-board: RESET-BOARD · arm-house-bot: ARM-HOUSE-BOT · prune-race-board: PRUNE-BOARD'
        required: false
        type: string
      reset_full:
        description: 'reset-race-board only: also zero the campaign spend counters (pool + seed budget)'
        required: false
        default: false
        type: boolean
      enable_staking:
        description: 'arm-mainnet only: set STAKING_ENABLED=true (real-money staked play — needs R-COMP-2 sign-off)'
        required: false
        default: false
        type: boolean
      race_ends_at:
        description: 'arm-mainnet only: RACE_ENDS_AT (ISO 8601, e.g. 2026-08-01T00:00:00Z) — optional'
        required: false
        type: string
      staking_allowed_countries:
        description: 'arm-mainnet only: STAKING_ALLOWED_COUNTRIES (R-COMP-1 allowlist, CSV of ISO codes) — optional'
        required: false
        type: string
      race_seed_cents:
        description: 'arm-mainnet only: RACE_SEED_CENTS — cUSD gas seed per burner before its mint. Must cover gas×maxFeePerGas at the current Celo base fee (≈3.5c at 200 gwei); 10 gives headroom.'
        required: false
        default: '10'
        type: string
      race_audit_name:
        description: 'race-audit only: spotlight players whose name contains this text (case-insensitive). Blank = spotlight the top 3.'
        required: false
        type: string
      token_address:
        description: 'allow-token only: the 0x stake token to whitelist on the escrows (e.g. USD₮ 0x48065fbBE25f71C9282ddf5e1cD6D6A887483D5e).'
        required: false
        type: string
      wallet_address:
        description: 'wallet-status only: the address to probe (cUSD + CELO balance). e.g. the house-bot wallet.'
        required: false
        type: string
      race_audit_full:
        description: 'race-audit only: print UNTRUNCATED wallet addresses (to copy a farmer into prune-race-board).'
        required: false
        default: false
        type: boolean
      prune_wallets:
        description: 'prune-race-board only: comma/space-separated wallet addresses to REMOVE from the leaderboard.'
        required: false
        type: string

concurrency: fly-ops

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # set-tier-rake: an ON-CHAIN owner call, not a Fly operation — the runner
      # (unlike the dev sandbox) can reach Celo RPC. Fixes the deployed escrows'
      # missing 1¢ Race tier rake (fell back to the 900 bps global: every race
      # winner was paid 1.82¢ of an announced 2¢). Idempotent; the script
      # verifies the caller IS the escrow owner and aborts loudly otherwise,
      # printing the owner address so the right key can be configured.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'set-tier-rake' }}
      - uses: actions/setup-node@v4
        if: ${{ inputs.operation == 'set-tier-rake' }}
        with:
          node-version: 22
      - name: set-tier-rake (rake-free 1c race tier on the DEPLOYED escrows)
        if: ${{ inputs.operation == 'set-tier-rake' }}
        env:
          NETWORK: celo
          # The escrow OWNER's key (the TREASURY when roles were split at deploy).
          # First configured secret wins; the on-chain owner check is the real gate.
          DEPLOYER_PRIVATE_KEY: ${{ secrets.ESCROW_OWNER_PRIVATE_KEY || secrets.TREASURY_PRIVATE_KEY || secrets.DEPLOYER_PRIVATE_KEY || secrets.ARBITER_PRIVATE_KEY }}
        run: |
          if [ -z "$DEPLOYER_PRIVATE_KEY" ]; then
            echo "::error::No owner key configured — add one repo secret among ESCROW_OWNER_PRIVATE_KEY / TREASURY_PRIVATE_KEY / DEPLOYER_PRIVATE_KEY (must be the escrow owner)."; exit 1
          fi
          npm ci
          npm run set-tier-rake -w packages/contracts
      # allow-token: on-chain OWNER call — whitelist a stake token on the DEPLOYED
      # escrows (setTokenAllowed). FIRST cutover step of the cUSD→USD₮ migration:
      # additive + idempotent, the current token stays allowed so cUSD play keeps
      # working. TOKEN_ADDRESS is sanitized to a 0x-hex address. Owner key from
      # repo secrets (same as set-tier-rake), never from inputs.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'allow-token' }}
      - uses: actions/setup-node@v4
        if: ${{ inputs.operation == 'allow-token' }}
        with:
          node-version: 22
      - name: allow-token (whitelist a stake token on the DEPLOYED escrows)
        if: ${{ inputs.operation == 'allow-token' }}
        env:
          NETWORK: celo
          RAW_TOKEN: ${{ inputs.token_address }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.ESCROW_OWNER_PRIVATE_KEY || secrets.TREASURY_PRIVATE_KEY || secrets.DEPLOYER_PRIVATE_KEY || secrets.ARBITER_PRIVATE_KEY }}
        run: |
          if [ -z "$DEPLOYER_PRIVATE_KEY" ]; then
            echo "::error::No owner key configured — add ESCROW_OWNER_PRIVATE_KEY / TREASURY_PRIVATE_KEY / DEPLOYER_PRIVATE_KEY (must be the escrow owner)."; exit 1
          fi
          TOKEN=$(printf '%s' "$RAW_TOKEN" | grep -oiE '0x[0-9a-f]{40}' | head -n1)
          if [ -z "$TOKEN" ]; then echo "::error::set token_address to the 0x stake token to whitelist"; exit 1; fi
          npm ci
          TOKEN_ADDRESS="$TOKEN" npm run allow-token -w packages/contracts
      # server-logs: READ-ONLY — fetches the recent Fly machine logs and prints
      # ONLY the operationally relevant lines (house-bot / stake-gate / settlement
      # / boot warnings), so a mainnet stake-lock failure can be diagnosed from
      # the REAL error instead of guesses. No tx, no Fly change, no free-form
      # input — the grep pattern is fixed in this file.
      - name: server-logs (house-bot / stake-gate diagnostics)
        if: ${{ inputs.operation == 'server-logs' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          flyctl logs -a ludo-arena --no-tail > /tmp/fly.log || true
          echo "== total lines fetched: $(wc -l < /tmp/fly.log) =="
          echo "== house-bot / stake-gate / settlement / race lines =="
          grep -aE "house-bot|stake-gate|settlement|\[race\]|MATCH_ABORTED|aborting|refund" /tmp/fly.log | tail -120 || echo "(no matching lines in the retained window)"
          echo "== boot / subsystem lines =="
          grep -aE "ARMED|DISABLED|boot|listening|\[store\]" /tmp/fly.log | tail -40 || true
      # probe-fees: READ-ONLY — runs a fixed diagnostic script INSIDE the Fly
      # machine (prod env: SETTLEMENT_RPC + fee switches) to explain the house
      # bot's CIP-64 "fee cap too low" rejection with live numbers. Sends no tx.
      # The script ships from this checkout (base64 over ssh), so it needs no
      # prior deploy; it only READS the RPC and env.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'probe-fees' }}
      - name: probe-fees (CIP-64 gas price diagnostics, in-machine)
        if: ${{ inputs.operation == 'probe-fees' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          B64=$(base64 -w0 apps/server/scripts/probeFees.cjs)
          flyctl ssh console -a ludo-arena -C "sh -lc 'echo $B64 | base64 -d > /tmp/probe.cjs && node /tmp/probe.cjs'"
      # probe-lock: READ-ONLY — reproduces the house bot's stake-lock fee path
      # in-machine (prod env + prod key, address only ever printed) WITHOUT
      # sending a tx: wallet nonce/balance, cip64Fees() success-or-throw, and the
      # maxFeePerGas viem actually attaches via prepareTransactionRequest. Ships
      # from this checkout over ssh; no deploy needed.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'probe-lock' }}
      - name: probe-lock (reproduce the stake-lock fee path, in-machine)
        if: ${{ inputs.operation == 'probe-lock' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          B64=$(base64 -w0 apps/server/scripts/probeLock.cjs)
          flyctl ssh console -a ludo-arena -C "sh -lc 'echo $B64 | base64 -d > /tmp/probelock.cjs && node /tmp/probelock.cjs'"
      # probe-feecurrencies: READ-ONLY — enumerates the FeeCurrencyDirectory and
      # resolves each registered fee currency's underlying token, to find the USD₮
      # gas ADAPTER address (distinct from the raw 6-dec USDT staking token) for
      # the cUSD→USDT migration. In-machine (mainnet RPC), no tx.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'probe-feecurrencies' }}
      - name: probe-feecurrencies (USDT gas adapter discovery, in-machine)
        if: ${{ inputs.operation == 'probe-feecurrencies' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          B64=$(base64 -w0 apps/server/scripts/probeFeeCurrencies.cjs)
          flyctl ssh console -a ludo-arena -C "sh -lc 'echo $B64 | base64 -d > /tmp/probefc.cjs && node /tmp/probefc.cjs'"
      # wallet-status: READ-ONLY — prints an arbitrary wallet's cUSD + CELO balance
      # (e.g. the house-bot wallet, to confirm it is funded). No tx; runs on the
      # runner against Celo RPC. Honours RACE_FEE_IN_STABLE so the "gas mode" line
      # tells you whether the wallet needs native CELO.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'wallet-status' }}
      - uses: actions/setup-node@v4
        if: ${{ inputs.operation == 'wallet-status' }}
        with:
          node-version: 22
      - name: wallet-status (cUSD + CELO balance of an address)
        if: ${{ inputs.operation == 'wallet-status' }}
        env:
          NETWORK: celo
          RACE_FEE_IN_STABLE: 'true'
          WALLET_ADDRESS: ${{ inputs.wallet_address }}
        run: |
          if [ -z "$WALLET_ADDRESS" ]; then echo "::error::set wallet_address (the address to probe)"; exit 1; fi
          npm ci
          npm run wallet-status -w packages/contracts
      # race-status: READ-ONLY — prints the faucet's live cUSD balance + how many
      # players it can still fund. No tx, no Fly change; the runner reaches Celo
      # RPC (the dev sandbox can't). Derives the faucet address from the standing
      # RACE_FAUCET_PRIVATE_KEY secret (never printed) — same secret arm-mainnet uses.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'race-status' }}
      - uses: actions/setup-node@v4
        if: ${{ inputs.operation == 'race-status' }}
        with:
          node-version: 22
      - name: race-status (faucet balance + funding capacity)
        if: ${{ inputs.operation == 'race-status' }}
        env:
          NETWORK: celo
          RACE_FAUCET_PRIVATE_KEY: ${{ secrets.RACE_FAUCET_PRIVATE_KEY }}
          FAUCET_ADDRESS: ${{ vars.RACE_FAUCET_ADDRESS }}
        run: |
          if [ -z "$RACE_FAUCET_PRIVATE_KEY" ] && [ -z "$FAUCET_ADDRESS" ]; then
            echo "::error::Set the RACE_FAUCET_PRIVATE_KEY secret (or a RACE_FAUCET_ADDRESS repo variable) so the faucet balance can be read."; exit 1
          fi
          npm ci
          npm run race-status -w packages/contracts
      # onchain-activity: READ-ONLY — counts the transactions our mainnet
      # deployment has generated (the Proof of Ship figure). No tx, no Fly
      # change; reads a public block explorer (Blockscout, no key) with an RPC
      # nonce fallback. Contract addresses come from the baked deployments.json;
      # the faucet address is derived from RACE_FAUCET_PRIVATE_KEY (never printed)
      # or a RACE_FAUCET_ADDRESS repo variable — both optional.
      - uses: actions/checkout@v4
        if: ${{ inputs.operation == 'onchain-activity' }}
      - uses: actions/setup-node@v4
        if: ${{ inputs.operation == 'onchain-activity' }}
        with:
          node-version: 22
      - name: onchain-activity (mainnet transaction count)
        if: ${{ inputs.operation == 'onchain-activity' }}
        env:
          NETWORK: celo
          RACE_FAUCET_PRIVATE_KEY: ${{ secrets.RACE_FAUCET_PRIVATE_KEY }}
          FAUCET_ADDRESS: ${{ vars.RACE_FAUCET_ADDRESS }}
        run: |
          npm ci
          npm run onchain-activity -w packages/contracts
      - name: unset COSMETICS_STORE_ADDRESS
        if: ${{ inputs.operation == 'unset-cosmetics-store-address' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          echo "Secrets BEFORE (names only):"
          flyctl secrets list -a ludo-arena
          if flyctl secrets list -a ludo-arena | grep -q COSMETICS_STORE_ADDRESS; then
            flyctl secrets unset COSMETICS_STORE_ADDRESS -a ludo-arena
            echo "COSMETICS_STORE_ADDRESS unset — machine restarts with deployments.json as the only source."
          else
            echo "COSMETICS_STORE_ADDRESS is not set — nothing to do."
          fi
          echo "Secrets AFTER (names only):"
          flyctl secrets list -a ludo-arena
      - name: unset ESCROW_ADDRESS + ESCROW_N_ADDRESS
        if: ${{ inputs.operation == 'unset-escrow-addresses' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          echo "Secrets BEFORE (names only):"
          flyctl secrets list -a ludo-arena
          TO_UNSET=""
          # -w: whole-token match, so ESCROW_ADDRESS never false-positives on
          # the ESCROW_N_ADDRESS row (underscores count as word characters).
          for name in ESCROW_ADDRESS ESCROW_N_ADDRESS; do
            if flyctl secrets list -a ludo-arena | grep -qw "$name"; then TO_UNSET="$TO_UNSET $name"; fi
          done
          if [ -n "$TO_UNSET" ]; then
            flyctl secrets unset $TO_UNSET -a ludo-arena
            echo "Unset:$TO_UNSET — machine restarts with deployments.json as the only source."
          else
            echo "Neither escrow secret is set — nothing to do."
          fi
          echo "Secrets AFTER (names only):"
          flyctl secrets list -a ludo-arena
      - name: unset STAKING_ALLOWED_COUNTRIES
        if: ${{ inputs.operation == 'unset-staking-allowed-countries' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "::error::FLY_API_TOKEN secret is not configured"; exit 1
          fi
          echo "Secrets BEFORE (names only):"
          flyctl secrets list -a ludo-arena
          # -w: whole-token match (same rationale as the escrow unset above).
          if flyctl secrets list -a ludo-arena | grep -qw STAKING_ALLOWED_COUNTRIES; then
            flyctl secrets unset STAKING_ALLOWED_COUNTRIES -a ludo-arena
            echo "STAKING_ALLOWED_COUNTRIES unset — machine restarts with geo-gating OPEN (no allowlist)."
            echo "::warning::Staked play is now reachable from EVERY region (R-COMP-1 operator call). Wire a trusted edge + a legal-reviewed allowlist before scaling real-money play (docs/DEPLOY.md §G-6)."
          else
            echo "STAKING_ALLOWED_COUNTRIES is not set — nothing to do."
          fi
          echo "Secrets AFTER (names only):"
          flyctl secrets list -a ludo-arena
      - name: arm mainnet (Celo) — set launch secrets
        if: ${{ inputs.operation == 'arm-mainnet' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          # Real key material — sourced from REPO SECRETS, never from inputs.
          ARBITER_PRIVATE_KEY: ${{ secrets.ARBITER_PRIVATE_KEY }}
          RACE_FAUCET_PRIVATE_KEY: ${{ secrets.RACE_FAUCET_PRIVATE_KEY }}
          CONFIRM: ${{ inputs.confirm }}
          ENABLE_STAKING: ${{ inputs.enable_staking }}
          RACE_ENDS_AT: ${{ inputs.race_ends_at }}
          STAKING_ALLOWED_COUNTRIES: ${{ inputs.staking_allowed_countries }}
          RACE_SEED_CENTS: ${{ inputs.race_seed_cents }}
        run: |
          set -eu
          if [ -z "$FLY_API_TOKEN" ]; then echo "::error::FLY_API_TOKEN secret is not configured"; exit 1; fi
          if [ "${CONFIRM:-}" != "ARM-MAINNET" ]; then
            echo "::error::type ARM-MAINNET in the 'confirm' box to proceed (guards against an accidental run)"; exit 1
          fi
          if [ -z "${ARBITER_PRIVATE_KEY:-}" ]; then
            echo "::error::add the ARBITER_PRIVATE_KEY repo secret first (Settings → Secrets and variables → Actions)"; exit 1
          fi
          if [ -z "${RACE_FAUCET_PRIVATE_KEY:-}" ]; then
            echo "::error::add the RACE_FAUCET_PRIVATE_KEY repo secret first (Settings → Secrets and variables → Actions)"; exit 1
          fi
          echo "Secrets BEFORE (names only):"
          flyctl secrets list -a ludo-arena || true
          # Build the import body from env — secret VALUES are GitHub-masked in
          # logs, and `secrets import` reads NAME=value from stdin so nothing
          # sensitive lands in argv. One import = one atomic restart.
          {
            echo "CHAIN=celo"
            echo "RACE_WEEK_ACTIVE=true"
            echo "RACE_JIT_FUNDING=true"
            echo "RACE_FEE_IN_STABLE=true"
            echo "RACE_QUOTA_CENTS=10"
            echo "RACE_PER_GAME_CENTS=2"
            echo "RACE_POOL_CENTS=3000"
            echo "RACE_SEED_CENTS=${RACE_SEED_CENTS:-10}"
            echo "ARBITER_PRIVATE_KEY=$ARBITER_PRIVATE_KEY"
            echo "RACE_FAUCET_PRIVATE_KEY=$RACE_FAUCET_PRIVATE_KEY"
            if [ "${ENABLE_STAKING:-false}" = "true" ]; then echo "STAKING_ENABLED=true"; fi
            if [ -n "${RACE_ENDS_AT:-}" ]; then echo "RACE_ENDS_AT=$RACE_ENDS_AT"; fi
            if [ -n "${STAKING_ALLOWED_COUNTRIES:-}" ]; then echo "STAKING_ALLOWED_COUNTRIES=$STAKING_ALLOWED_COUNTRIES"; fi
          } | flyctl secrets import -a ludo-arena
          echo "Secrets AFTER (names only):"
          flyctl secrets list -a ludo-arena
          if [ "${ENABLE_STAKING:-false}" = "true" ]; then
            echo "::warning::STAKING_ENABLED=true — real-money staked play is now ARMED. Confirm R-COMP-2 sign-off + the STAKING_ALLOWED_COUNTRIES allowlist are correct."
          else
            echo "STAKING_ENABLED left UNSET — mainnet free play + Race Week are armed; staked play stays OFF (R-COMP-2 gate). Re-run with enable_staking=true after sign-off."
          fi
      # reset-race-board: wipe the Race Week leaderboard for a clean pre-launch
      # slate. Runs INSIDE the machine (via ssh) because the store (Redis/Postgres)
      # is only reachable from there — the reset uses the server's own createStore,
      # so it works on any backend. `reset_full` also zeroes the campaign spend
      # counters (pool + seed budget). Confirm-gated (RESET-BOARD) against misfires.
      - name: reset Race Week leaderboard
        if: ${{ inputs.operation == 'reset-race-board' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CONFIRM: ${{ inputs.confirm }}
          RESET_FULL: ${{ inputs.reset_full }}
        run: |
          set -eu
          if [ -z "$FLY_API_TOKEN" ]; then echo "::error::FLY_API_TOKEN secret is not configured"; exit 1; fi
          if [ "${CONFIRM:-}" != "RESET-BOARD" ]; then
            echo "::error::type RESET-BOARD in the 'confirm' box to proceed (guards against an accidental run)"; exit 1
          fi
          ARG=""
          if [ "${RESET_FULL:-false}" = "true" ]; then ARG="full"; fi
          echo "Resetting the Race Week leaderboard on ludo-arena (full=${RESET_FULL:-false})…"
          flyctl ssh console -a ludo-arena -C "sh -lc 'cd /app && npm run reset-race-board -w apps/server -- $ARG'"
      # prune-race-board: TARGETED removal of specific (farmed) wallets from the
      # leaderboard before prize distribution — unlike reset-race-board it leaves
      # every legitimate player intact. Runs INSIDE the machine (store access).
      # Confirm-gated (PRUNE-BOARD). PRUNE_WALLETS is sanitized to 0x-hex + commas
      # so it can't break out of the ssh command.
      - name: prune Race Week leaderboard (targeted)
        if: ${{ inputs.operation == 'prune-race-board' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          CONFIRM: ${{ inputs.confirm }}
          PRUNE_WALLETS: ${{ inputs.prune_wallets }}
        run: |
          set -eu
          if [ -z "$FLY_API_TOKEN" ]; then echo "::error::FLY_API_TOKEN secret is not configured"; exit 1; fi
          if [ "${CONFIRM:-}" != "PRUNE-BOARD" ]; then
            echo "::error::type PRUNE-BOARD in the 'confirm' box to proceed (guards against an accidental run)"; exit 1
          fi
          SAFE=$(printf '%s' "${PRUNE_WALLETS:-}" | tr -cd '[:xdigit:]xX, ')
          if [ -z "$SAFE" ]; then echo "::error::set prune_wallets to the addresses to remove"; exit 1; fi
          echo "Pruning wallets from the Race Week leaderboard on ludo-arena: $SAFE"
          flyctl ssh console -a ludo-arena -C "sh -lc 'cd /app && PRUNE_WALLETS=\"$SAFE\" npm run prune-race-board -w apps/server'"
      # race-audit: READ-ONLY leaderboard forensics — reconstructs the real match
      # history behind each player's points to surface wash-trading / farming.
      # Runs INSIDE the machine (via ssh) because the prod store (Postgres) is
      # only reachable from there; it issues SELECTs only, no writes. NAME (from
      # race_audit_name) spotlights matching players; blank spotlights the top 3.
      - name: audit Race Week leaderboard
        if: ${{ inputs.operation == 'race-audit' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          AUDIT_NAME: ${{ inputs.race_audit_name }}
          AUDIT_FULL: ${{ inputs.race_audit_full }}
        run: |
          set -eu
          if [ -z "$FLY_API_TOKEN" ]; then echo "::error::FLY_API_TOKEN secret is not configured"; exit 1; fi
          # NAME is passed through the remote env; single-quoted to survive the ssh
          # shell. Only [a-zA-Z0-9 _-] are kept so it can't break out of the command.
          SAFE=$(printf '%s' "${AUDIT_NAME:-}" | tr -cd '[:alnum:] _-')
          FULL=$([ "${AUDIT_FULL:-false}" = "true" ] && echo 1 || echo 0)
          echo "Auditing the Race Week leaderboard on ludo-arena (name filter: '${SAFE:-<top 3>}', full=$FULL)…"
          flyctl ssh console -a ludo-arena -C "sh -lc 'cd /app && NAME=\"$SAFE\" FULL=\"$FULL\" npm run race-audit -w apps/server'"
      # arm-house-bot: turn ON the Race house bot on the running server in one
      # atomic secrets import (single restart). RACE_HOUSE_BOT_PRIVATE_KEY is read
      # from a GitHub REPO SECRET (never an input), so the key never appears in the
      # run inputs or logs. The bot fills Race matchmaking on demand + absorbs
      # flagged farmers; its games NEVER score and NEVER draw the faucet, and each
      # is tagged is_house_bot. Requires typing ARM-HOUSE-BOT (guards a misfire).
      # PRE-ARM CHECKLIST (operator): (1) fund the house-bot wallet with cUSD +
      # (if not FEE_IN_STABLE) native CELO; (2) staking must already be armed
      # (STAKING_ENABLED + arbiter) — the bot rides the same escrow path.
      - name: arm Race house bot
        if: ${{ inputs.operation == 'arm-house-bot' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          RACE_HOUSE_BOT_PRIVATE_KEY: ${{ secrets.RACE_HOUSE_BOT_PRIVATE_KEY }}
          CONFIRM: ${{ inputs.confirm }}
        run: |
          set -eu
          if [ -z "$FLY_API_TOKEN" ]; then echo "::error::FLY_API_TOKEN secret is not configured"; exit 1; fi
          if [ "${CONFIRM:-}" != "ARM-HOUSE-BOT" ]; then
            echo "::error::type ARM-HOUSE-BOT in the 'confirm' box to proceed (guards against an accidental run)"; exit 1
          fi
          if [ -z "${RACE_HOUSE_BOT_PRIVATE_KEY:-}" ]; then
            echo "::error::add the RACE_HOUSE_BOT_PRIVATE_KEY repo secret first (Settings → Secrets and variables → Actions), and fund that wallet with cUSD (+ CELO if not FEE_IN_STABLE)"; exit 1
          fi
          echo "Secrets BEFORE (names only):"
          flyctl secrets list -a ludo-arena || true
          {
            echo "RACE_HOUSE_BOT_ENABLED=true"
            echo "RACE_HOUSE_BOT_PRIVATE_KEY=$RACE_HOUSE_BOT_PRIVATE_KEY"
          } | flyctl secrets import -a ludo-arena
          echo "Secrets AFTER (names only):"
          flyctl secrets list -a ludo-arena
          echo "::warning::Race house bot ARMED — it now stakes real 1c on the Race tier. Confirm the house-bot wallet is funded. Disarm by unsetting RACE_HOUSE_BOT_ENABLED."
