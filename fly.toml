# fly.toml app configuration file generated for ludo-arena on 2026-07-11T21:25:18Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ludo-arena'
primary_region = 'ams'

[build]
  dockerfile = 'apps/server/Dockerfile'

[env]
  CHAIN = 'celo-sepolia'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
