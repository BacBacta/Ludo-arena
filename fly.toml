# Fly.io config for the Ludo Arena game server (apps/server).
# Deploy: flyctl launch --no-deploy (first time) then flyctl deploy.
# Secrets (flyctl secrets set ...): REDIS_URL, DATABASE_URL, ARBITER_PRIVATE_KEY,
# CHAIN, ESCROW_ADDRESS, BLOCKED_COUNTRIES.
app = "ludo-arena"
primary_region = "ams"

[build]
  dockerfile = 'apps/server/Dockerfile'

[env]
  PORT = "8080"
  CHAIN = "celo-sepolia"
  ESCROW_ADDRESS = "0x3fad6b9ecbc3f0c9064603dc762f8ebd6c7864d6"

[http_service]
  internal_port = 8080
  force_https = true
  # Single always-on machine: the game server keeps rooms / tables / matchmaking
  # queues in memory, so ALL websocket connections must land on the SAME process.
  # Never auto-stop (a cold start would exceed the client's 2.5s connect timeout →
  # bot fallback) and never run more than one (a 2nd machine splits the state and
  # breaks matchmaking). Scale is pinned to 1 via `flyctl scale count 1`.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '3s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
